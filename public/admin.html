<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bible Letters - Admin Panel</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container {
      background: white;
      border-radius: 20px;
      padding: 40px;
      max-width: 500px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    h1 {
      color: #667eea;
      margin-bottom: 10px;
      font-size: 28px;
    }
    p {
      color: #666;
      margin-bottom: 30px;
      font-size: 14px;
    }
    label {
      display: block;
      color: #333;
      font-weight: 600;
      margin-bottom: 8px;
      font-size: 14px;
    }
    input, select {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid #e0e0e0;
      border-radius: 10px;
      font-size: 16px;
      margin-bottom: 20px;
      transition: border-color 0.3s;
    }
    input:focus, select:focus {
      outline: none;
      border-color: #667eea;
    }
    button {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
    }
    button:active {
      transform: translateY(0);
    }
    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    .result {
      margin-top: 20px;
      padding: 16px;
      border-radius: 10px;
      font-size: 14px;
      display: none;
    }
    .result.success {
      background: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
      display: block;
    }
    .result.error {
      background: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
      display: block;
    }
    .info {
      background: #e7f3ff;
      border: 1px solid #b3d9ff;
      border-radius: 10px;
      padding: 16px;
      margin-bottom: 20px;
      font-size: 13px;
      color: #004085;
    }
    .info strong {
      display: block;
      margin-bottom: 8px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🔑 Admin Panel</h1>
    <p>Add Pro/Family subscription to any user</p>

    <div class="info">
      <strong>📝 How to get User ID:</strong>
      1. Sign in to letter.biblefunland.com<br>
      2. Open Console (Cmd+Option+J)<br>
      3. Type: <code>window.Clerk.user.id</code><br>
      4. Copy the user ID (starts with "user_")
    </div>

    <form id="addProForm">
      <label for="userId">Clerk User ID</label>
      <input 
        type="text" 
        id="userId" 
        placeholder="user_2abc123xyz..." 
        required
      >

      <label for="plan">Subscription Plan</label>
      <select id="plan" required>
        <option value="pro">Pro ($4.99/month)</option>
        <option value="family">Family ($9.99/month)</option>
      </select>

      <label for="adminKey">Admin Key</label>
      <input 
        type="password" 
        id="adminKey" 
        placeholder="Enter admin key" 
        value="bible-admin-2024"
        required
      >

      <button type="submit" id="submitBtn">
        ✨ Add Subscription
      </button>
    </form>

    <div id="result" class="result"></div>
  </div>

  <script>
    const form = document.getElementById('addProForm');
    const resultDiv = document.getElementById('result');
    const submitBtn = document.getElementById('submitBtn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const userId = document.getElementById('userId').value.trim();
      const plan = document.getElementById('plan').value;
      const adminKey = document.getElementById('adminKey').value.trim();

      if (!userId || !adminKey) {
        showResult('Please fill in all fields', 'error');
        return;
      }

      submitBtn.disabled = true;
      submitBtn.textContent = '⏳ Adding subscription...';

      try {
        const response = await fetch(`/api/admin/add-pro?userId=${encodeURIComponent(userId)}&plan=${plan}&adminKey=${encodeURIComponent(adminKey)}`);
        const data = await response.json();

        if (response.ok && data.success) {
          showResult(`✅ Success! ${data.message}\n\nUser ID: ${data.userId}\nPlan: ${data.plan}\nExpires: ${new Date(data.expiresAt).toLocaleDateString()}`, 'success');
          form.reset();
        } else {
          showResult(`❌ Error: ${data.error || 'Unknown error'}`, 'error');
        }
      } catch (error) {
        showResult(`❌ Network error: ${error.message}`, 'error');
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = '✨ Add Subscription';
      }
    });

    function showResult(message, type) {
      resultDiv.textContent = message;
      resultDiv.className = `result ${type}`;
    }
  </script>
</body>
</html>
